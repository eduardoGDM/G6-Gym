# VirtualHost do Apache para servir a aplicação Laravel a partir de public/.
# A porta é ajustada em tempo de execução pelo entrypoint (variável PORT do Render).
<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Logs para stdout/stderr (visíveis nos logs do Render).
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
